<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Identity Generator</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --primary: #4f46e5; /* Indigo 600 */
            --primary-light: #e0e7ff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER AREA */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.125rem;
            font-weight: 300;
        }

        /* FLOATING CONTROLS */
        .controls-container {
            background: var(--surface);
            padding: 10px;
            border-radius: 50px; /* Pill shape */
            box-shadow: var(--shadow-md);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            transition: transform 0.2s;
        }
        
        .controls-container:hover {
            box-shadow: var(--shadow-lg);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input[type="number"] {
            padding: 12px 15px 12px 40px;
            border: none;
            outline: none;
            font-size: 1rem;
            width: 140px;
            border-radius: 40px;
            background: transparent;
            font-weight: 600;
            color: var(--text-main);
        }

        .separator {
            width: 1px;
            height: 24px;
            background-color: var(--border);
        }

        .btn-generate {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-generate:hover {
            background-color: #4338ca;
            transform: scale(1.05);
        }

        /* STATS TAGS */
        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 20px;
            background: white;
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tag i { color: var(--primary); }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* CARD DESIGN */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: #c7d2fe;
        }

        /* Avatar Section */
        .card-top {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .name-group {
            flex: 1;
        }

        .name-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .role-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
        }

        /* Field Rows */
        .field-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .field-row:hover {
            background: white;
            border-color: var(--primary-light);
        }

        .field-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
        }
        
        /* Hidden in card, used if needed, but we integrated style directly */

        .field-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow: hidden;
        }

        .field-icon {
            color: var(--text-muted);
            font-size: 0.9rem;
            width: 20px;
            text-align: center;
        }

        .field-value {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field-value.user { color: var(--primary); font-weight: 600; }
        .field-value.email { color: var(--text-muted); font-size: 0.85rem; }

        .btn-copy {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: white;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-copy:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.4s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .controls-container { width: 100%; border-radius: 16px; flex-direction: column; }
            input[type="number"] { width: 100%; text-align: center; padding-left: 15px; }
            .input-wrapper i { display: none; }
            .separator { display: none; }
            .btn-generate { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Identity Generator</h1>
            <p class="subtitle">Create unique digital identities with high precision.</p>
            
            <div class="controls-container">
                <div class="input-wrapper">
                    <i class="fa-solid fa-layer-group"></i>
                    <input type="number" id="amount" value="12" placeholder="Qty">
                </div>
                <div class="separator"></div>
                <button class="btn-generate" onclick="generateData()">
                    Generate Data
                </button>
            </div>
        </header>

        <div class="tags">
            <div class="tag"><i class="fa-solid fa-database"></i> 500+ Names Database</div>
            <div class="tag"><i class="fa-solid fa-shield-halved"></i> Unique Algorithm</div>
            <div class="tag" id="counterDisplay"><i class="fa-solid fa-check"></i> Ready</div>
        </div>

        <main class="grid" id="cardGrid">
            <!-- Cards will be generated here -->
        </main>
    </div>

    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check" style="color: #4ade80;"></i>
        <span id="toastMsg">Copied successfully!</span>
    </div>

    <script>
        // DATA DATABASE
        const firstNames = [
            "James","John","Robert","Michael","William","David","Richard","Joseph","Thomas","Charles",
            "Mary","Patricia","Jennifer","Linda","Elizabeth","Barbara","Susan","Jessica","Sarah","Karen",
            "Christopher","Daniel","Matthew","Anthony","Mark","Donald","Steven","Paul","Andrew","Joshua",
            "Kenneth","Kevin","Brian","George","Edward","Ronald","Timothy","Jason","Jeffrey","Ryan",
            "Jacob","Gary","Nicholas","Eric","Jonathan","Stephen","Larry","Justin","Scott","Brandon",
            "Benjamin","Samuel","Frank","Gregory","Raymond","Alexander","Patrick","Jack","Dennis","Jerry",
            "Lisa","Nancy","Betty","Margaret","Sandra","Ashley","Kimberly","Emily","Donna","Michelle",
            "Dorothy","Carol","Amanda","Melissa","Deborah","Stephanie","Rebecca","Sharon","Laura","Cynthia",
            "Kathleen","Amy","Angela","Shirley","Anna","Brenda","Pamela","Emma","Nicole","Helen",
            "Samantha","Katherine","Christine","Debra","Rachel","Carolyn","Janet","Catherine","Maria","Heather",
            "Diane","Julie","Joyce","Victoria","Olivia","Kelly","Christina","Lauren","Joan","Evelyn",
            "Judith","Megan","Cheryl","Andrea","Hannah","Martha","Jacqueline","Frances","Gloria","Ann",
            "Teresa","Kathryn","Sara","Janice","Jean","Alice","Doris","Abigail","Julia","Judy",
            "Grace","Denise","Amber","Marilyn","Beverly","Danielle","Theresa","Sophia","Marie","Diana",
            "Brittany","Natalie","Isabella","Charlotte","Mia","Alexis","Kayla","Lily","Hailey","Ava",
            "Camila","Penelope","Lillian","Zoey","Stella","Nora","Leah","Audrey","Bella","Claire",
            "Skylar","Lucy","Paisley","Savannah","Brooklyn","Addison","Kennedy","Autumn","Brooke","Layla",
            "Ellie","Aaliyah","Harper","Violet","Chloe","Ella","Emilie","Mila","Scarlett","Evelyn",
            "Abigail","Madison","Lindsay","Jenna","Tatiana","Clarissa","Eugene","Carlos","Russell","Martin",
            "Ernest","Phillip","Todd","Jesse","Craig","Alan","Shawn","Clarence","Sean","Philip",
            "Chris","Johnny","Earl","Jimmy","Antonio","Danny","Bryan","Tony","Luis","Mike",
            "Jeremy","Aaron","Randy","Howard","Eugene","Carlos","Russell","Martin","Ernest","Phillip"
        ];

        const lastNames = [
            "Smith","Johnson","Williams","Brown","Jones","Garcia","Miller","Davis","Rodriguez","Martinez",
            "Hernandez","Lopez","Gonzalez","Wilson","Anderson","Thomas","Taylor","Moore","Jackson","Martin",
            "Lee","Perez","Thompson","White","Harris","Sanchez","Clark","Ramirez","Lewis","Robinson",
            "Walker","Young","Allen","King","Wright","Scott","Torres","Nguyen","Hill","Flores",
            "Green","Adams","Nelson","Baker","Hall","Rivera","Campbell","Mitchell","Carter","Roberts",
            "Gomez","Phillips","Evans","Turner","Diaz","Parker","Cruz","Edwards","Collins","Reyes",
            "Stewart","Morris","Morales","Murphy","Cook","Rogers","Gutierrez","Ortiz","Morgan","Cooper",
            "Peterson","Bailey","Reed","Kelly","Howard","Ramos","Kim","Cox","Ward","Richardson",
            "Watson","Brooks","Chavez","Wood","Bennett","Gray","Mendoza","Ruiz","Hughes","Price",
            "Alvarez","Castillo","Sanders","Patel","Myers","Long","Ross","Foster","Jimenez","Powell",
            "Jenkins","Perry","Russell","Sullivan","Bell","Cole","Berry","Washington","West","Thompson",
            "Richardson","Woods","Cole","Washington","West","Bailey","Reed","Harris","Lewis","Robinson",
            "Walker","Young","Allen","King","Wright","Scott","Torres","Hill","Flores","Green",
            "Adams","Nelson","Baker","Hall","Rivera","Campbell","Mitchell","Carter","Roberts","Gomez",
            "Phillips","Evans","Turner","Diaz","Parker","Cruz","Edwards","Collins","Reyes","Stewart"
        ];

        let generatedUsernames = new Set();

        function generateData() {
            const amount = parseInt(document.getElementById('amount').value) || 12;
            const grid = document.getElementById('cardGrid');
            const counter = document.getElementById('counterDisplay');
            
            grid.innerHTML = ""; 
            generatedUsernames.clear();

            for (let i = 0; i < amount; i++) {
                const first = firstNames[Math.floor(Math.random() * firstNames.length)];
                const last = lastNames[Math.floor(Math.random() * lastNames.length)];
                const fullName = `${first} ${last}`;
                const initials = (first[0] + last[0]).toUpperCase();
                
                // Anti-Duplicate Logic
                let username = "";
                let isUnique = false;
                
                while (!isUnique) {
                    const style = Math.floor(Math.random() * 5); 
                    const randomNum = Math.floor(Math.random() * 99999);

                    switch(style) {
                        case 0: username = (first + last).toLowerCase(); break;
                        case 1: username = (first + "." + last).toLowerCase(); break;
                        case 2: username = (first + last + randomNum).toLowerCase(); break;
                        case 3: username = (first + "_" + last + randomNum).toLowerCase(); break;
                        case 4: username = (first + randomNum + last).toLowerCase(); break;
                    }

                    if (!generatedUsernames.has(username)) {
                        generatedUsernames.add(username);
                        isUnique = true;
                    }
                }

                const email = `${username}@mail.n2n.io`;

                // Render Modern Card
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="avatar">${initials}</div>
                        <div class="name-group">
                            <div class="name-text">${fullName}</div>
                            <span class="role-badge">User</span>
                        </div>
                        <button class="btn-copy" onclick="copyToClipboard('${fullName}')" title="Copy Name">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>

                    <div class="field-row">
                        <div class="field-content">
                            <i class="fa-brands fa-instagram field-icon"></i>
                            <span class="field-value user">@${username}</span>
                        </div>
                        <button class="btn-copy" onclick="copyToClipboard('${username}')" title="Copy Username">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>

                    <div class="field-row">
                        <div class="field-content">
                            <i class="fa-regular fa-envelope field-icon"></i>
                            <span class="field-value email">${email}</span>
                        </div>
                        <button class="btn-copy" onclick="copyToClipboard('${email}')" title="Copy Email">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            }
            counter.innerHTML = `<i class="fa-solid fa-check"></i> Generated: ${amount}`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const t = document.querySelector('#toast span');
                t.innerText = "Copied: " + text.substring(0, 20) + (text.length>20?"...":"");
                document.getElementById('toast').classList.add('show');
                setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
            });
        }

        window.onload = generateData;
    </script>
</body>
</html>
