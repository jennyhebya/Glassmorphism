<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator ID - Glassmorphism Style</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            position: relative;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Dekorasi Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #ff9a9e;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #a18cd1;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 250px;
            height: 250px;
            background: #84fab0;
            top: 40%;
            left: 40%;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* CONTAINER UTAMA */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* HEADER CARD */
        .header-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: var(--glass-shadow);
            text-align: center;
        }

        .header-card h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-card p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .input-box {
            position: relative;
        }

        .input-box input {
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.5);
            font-size: 1.1rem;
            width: 150px;
            outline: none;
            transition: 0.3s;
            color: var(--text-dark);
            font-weight: 600;
        }

        .input-box input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .btn-gen {
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-gen:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-gen:active {
            transform: translateY(1px);
        }

        /* TABLE SECTION */
        .table-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 900px;
        }

        th {
            text-align: left;
            padding: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.3);
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            vertical-align: middle;
            font-size: 1rem;
            color: var(--text-dark);
            transition: background 0.2s;
        }

        tr:last-child td { border-bottom: none; }
        
        tr:hover td {
            background: rgba(255,255,255,0.5);
        }

        /* COLUMN STYLES */
        .col-id { width: 5%; color: var(--primary); font-weight: 700; }
        
        .cell-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .txt-name { font-weight: 600; color: var(--text-dark); }
        
        .txt-user { 
            font-family: 'Courier New', monospace; 
            color: var(--primary); 
            font-weight: 600; 
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .txt-email { 
            font-family: 'Courier New', monospace; 
            color: var(--text-light); 
        }

        /* COPY BUTTON */
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: white;
            color: var(--secondary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-icon:hover {
            background: var(--secondary);
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 41, 59, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 0.95rem;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-card h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .input-box input { width: 100%; }
            .btn-gen { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <!-- Header Section -->
        <header class="header-card">
            <h1>Creative ID Generator</h1>
            <p>Create Fullname, Username and Email @mail.n2n.io.</p>
            
            <div class="controls">
                <div class="input-box">
                    <input type="number" id="amount" value="5" placeholder="Jml">
                </div>
                <button class="btn-gen" onclick="generateData()">
                    <i class="fa-solid fa-bolt"></i> Generate Data
                </button>
            </div>
        </header>

        <!-- Table Section -->
        <div class="table-wrapper">
            <div class="table-scroll">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th class="col-id">#</th>
                            <th>Full Name</th>
                            <th>Username</th>
                            <th>Email Address</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Custom Toast -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-check-circle" style="color: #4ade80;"></i>
        <span id="toastMsg">Berhasil disalin!</span>
    </div>

    <script>
        // DATABASE
        const firstNames = [
            "James", "John", "Robert", "Michael", "William", "David", "Richard", "Joseph", "Thomas", "Charles",
            "Mary", "Patricia", "Jennifer", "Linda", "Elizabeth", "Barbara", "Susan", "Jessica", "Sarah", "Karen",
            "Christopher", "Daniel", "Matthew", "Anthony", "Mark", "Donald", "Steven", "Paul", "Andrew", "Joshua",
            "Kenneth", "Kevin", "Brian", "George", "Edward", "Ronald", "Timothy", "Jason", "Jeffrey", "Ryan",
            "Jacob", "Gary", "Nicholas", "Eric", "Jonathan", "Stephen", "Larry", "Justin", "Scott", "Brandon",
            "Benjamin", "Samuel", "Frank", "Gregory", "Raymond", "Alexander", "Patrick", "Jack", "Dennis", "Jerry",
            "Lisa", "Nancy", "Betty", "Margaret", "Sandra", "Ashley", "Kimberly", "Emily", "Donna", "Michelle",
            "Dorothy", "Carol", "Amanda", "Melissa", "Deborah", "Stephanie", "Rebecca", "Sharon", "Laura", "Cynthia",
            "Kathleen", "Amy", "Angela", "Shirley", "Anna", "Brenda", "Pamela", "Emma", "Nicole", "Helen",
            "Samantha", "Katherine", "Christine", "Debra", "Rachel", "Carolyn", "Janet", "Catherine", "Maria", "Heather"
        ];

        const lastNames = [
            "Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez",
            "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin",
            "Lee", "Perez", "Thompson", "White", "Harris", "Sanchez", "Clark", "Ramirez", "Lewis", "Robinson",
            "Walker", "Young", "Allen", "King", "Wright", "Scott", "Torres", "Nguyen", "Hill", "Flores",
            "Green", "Adams", "Nelson", "Baker", "Hall", "Rivera", "Campbell", "Mitchell", "Carter", "Roberts"
        ];

        // LOGIC
        function generateData() {
            const amount = parseInt(document.getElementById('amount').value) || 50;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            for (let i = 0; i < amount; i++) {
                const first = firstNames[Math.floor(Math.random() * firstNames.length)];
                const last = lastNames[Math.floor(Math.random() * lastNames.length)];
                const fullName = `${first} ${last}`;
                
                // Username Variations
                const style = Math.floor(Math.random() * 4); 
                let username = "";
                const randomNum = Math.floor(Math.random() * 999);

                switch(style) {
                    case 0: username = (first + last).toLowerCase(); break;
                    case 1: username = (first + "." + last).toLowerCase(); break;
                    case 2: username = (first + last + randomNum).toLowerCase(); break;
                    case 3: username = (first + "_" + last + randomNum).toLowerCase(); break;
                }

                const email = `${username}@mail.n2n.io`;

                // Build Row
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="col-id">${i + 1}</td>
                    <td>
                        <div class="cell-flex">
                            <span class="txt-name">${fullName}</span>
                            <button class="btn-icon" onclick="copyToClipboard('${fullName}')">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="cell-flex">
                            <span class="txt-user">@${username}</span>
                            <button class="btn-icon" onclick="copyToClipboard('@${username}')">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="cell-flex">
                            <span class="txt-email">${email}</span>
                            <button class="btn-icon" onclick="copyToClipboard('${email}')">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Teks disalin: ${text.substring(0, 20)}${text.length > 20 ? '...' : ''}`);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Run on load
        window.onload = generateData;
    </script>
</body>
</html>
