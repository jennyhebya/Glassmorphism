<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Generator - 2026 Edition</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS VARIABLES - DEFAULT LIGHT MODE */
        :root {
            /* Light Theme Colors */
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f8fafc;
            --primary: #4f46e5;       /* Indigo */
            --primary-light: #e0e7ff;
            --primary-glow: rgba(79, 70, 229, 0.2);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --input-bg: #f1f5f9;
        }

        /* DARK MODE OVERRIDES */
        body.dark-mode {
            /* Dark Theme Colors */
            --bg-body: #020617;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #f59e0b;       /* Amber Gold */
            --primary-light: rgba(245, 158, 11, 0.15);
            --primary-glow: rgba(245, 158, 11, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background 0.3s, color 0.3s, border-color 0.3s; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* THEME TOGGLE BUTTON */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 1.2rem;
        }
        .theme-toggle:hover { transform: rotate(15deg); border-color: var(--primary); color: var(--primary); }

        /* HEADER AREA */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding-top: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.125rem;
            font-weight: 300;
        }

        /* CONTROLS BAR */
        .controls-wrapper {
            background: var(--surface);
            padding: 10px;
            border-radius: 50px;
            box-shadow: var(--shadow-md);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            max-width: 100%;
        }
        
        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input[type="number"] {
            padding: 14px 15px 14px 45px;
            border: none;
            outline: none;
            font-size: 1rem;
            width: 140px;
            border-radius: 40px;
            background: transparent;
            font-weight: 600;
            color: var(--text-main);
        }
        
        input[type="number"]::placeholder { color: var(--text-muted); opacity: 0.6; }

        .separator {
            width: 1px;
            height: 24px;
            background-color: var(--border);
        }

        /* BUTTONS */
        .btn {
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        /* Specific fix for Dark mode text color inside gold button */
        body.dark-mode .btn-generate { color: #0f172a; }

        .btn-generate:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-copy-all {
            background: var(--surface-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-copy-all:hover { background: var(--primary); color: white; border-color: var(--primary); }
        body.dark-mode .btn-copy-all:hover { color: #0f172a; }

        /* STATS TAGS */
        .tags {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: 50px;
            background: var(--surface-hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tag i { color: var(--primary); }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* CARD DESIGN */
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        /* Avatar Section */
        .card-top {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: var(--surface-hover);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .name-group {
            flex: 1;
        }

        .name-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .role-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--surface-hover);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            display: inline-block;
            border: 1px solid var(--border);
        }

        /* Field Rows */
        .field-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .field-row:hover {
            background: var(--surface-hover);
            border-color: var(--text-muted);
        }

        .field-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            overflow: hidden;
        }

        .field-icon {
            color: var(--text-muted);
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        .field-value {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field-value.user { 
            color: var(--primary); 
            font-weight: 700; 
            text-shadow: 0 0 5px var(--primary-glow);
        }
        .field-value.email { font-size: 0.85rem; }

        .btn-copy-mini {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-copy-mini:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-light);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            color: var(--text-main);
            padding: 14px 28px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 0.95rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.4s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Responsive */
        @media (max-width: 768px) {
            .controls-wrapper { width: 100%; border-radius: 20px; flex-direction: column; padding: 20px; }
            .input-wrapper, .btn { width: 100%; }
            input[type="number"] { width: 100%; text-align: center; padding-left: 15px; }
            .input-wrapper i { display: none; }
            .separator { display: none; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body class="light-mode"> <!-- Default Mode -->

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Ganti Tema">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>

    <div class="container">
        <header>
            <h1>Identity Generator</h1>
            <p class="subtitle">Universal Digital Identity Creation Platform.</p>
            
            <div class="controls-wrapper">
                <div class="input-wrapper">
                    <i class="fa-solid fa-layer-group"></i>
                    <input type="number" id="amount" value="5" placeholder="Jumlah">
                </div>
                <div class="separator"></div>
                <button class="btn btn-generate" onclick="generateData()">
                    <i class="fa-solid fa-bolt"></i> Generate
                </button>
                <div class="separator"></div>
                <button class="btn btn-copy-all" onclick="copyAllUsernames()">
                    <i class="fa-regular fa-copy"></i> Copy All Usernames
                </button>
            </div>
        </header>

        <div class="tags">
            <div class="tag"><i class="fa-solid fa-database"></i> Database 500+ Nama</div>
            <div class="tag"><i class="fa-solid fa-shield-halved"></i> Anti-Duplicate</div>
            <div class="tag" id="counterDisplay"><i class="fa-solid fa-check"></i> Ready</div>
        </div>

        <main class="grid" id="cardGrid">
            <!-- Cards will be generated here -->
        </main>
    </div>

    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check" style="color: var(--primary);"></i>
        <span id="toastMsg">successfully copied!</span>
    </div>

    <script>
        // DATA DATABASE
        const firstNames = ["James","John","Robert","Michael","William","David","Richard","Joseph","Thomas","Charles","Mary","Patricia","Jennifer","Linda","Elizabeth","Barbara","Susan","Jessica","Sarah","Karen","Christopher","Daniel","Matthew","Anthony","Mark","Donald","Steven","Paul","Andrew","Joshua","Kenneth","Kevin","Brian","George","Edward","Ronald","Timothy","Jason","Jeffrey","Ryan","Jacob","Gary","Nicholas","Eric","Jonathan","Stephen","Larry","Justin","Scott","Brandon","Benjamin","Samuel","Frank","Gregory","Raymond","Alexander","Patrick","Jack","Dennis","Jerry","Lisa","Nancy","Betty","Margaret","Sandra","Ashley","Kimberly","Emily","Donna","Michelle","Dorothy","Carol","Amanda","Melissa","Deborah","Stephanie","Rebecca","Sharon","Laura","Cynthia","Kathleen","Amy","Angela","Shirley","Anna","Brenda","Pamela","Emma","Nicole","Helen","Samantha","Katherine","Christine","Debra","Rachel","Carolyn","Janet","Catherine","Maria","Heather","Diane","Julie","Joyce","Victoria","Olivia","Kelly","Christina","Lauren","Joan","Evelyn","Judith","Megan","Cheryl","Andrea","Hannah","Martha","Jacqueline","Frances","Gloria","Ann","Teresa","Kathryn","Sara","Janice","Jean","Alice","Doris","Abigail","Julia","Judy","Grace","Denise","Amber","Marilyn","Beverly","Danielle","Theresa","Sophia","Marie","Diana","Brittany","Natalie","Isabella","Charlotte","Mia","Alexis","Kayla","Lily","Hailey","Ava","Camila","Penelope","Lillian","Zoey","Stella","Nora","Leah","Audrey","Bella","Claire","Skylar","Lucy","Paisley","Savannah","Brooklyn","Addison","Kennedy","Autumn","Brooke","Layla","Ellie","Aaliyah","Harper","Violet","Chloe","Ella","Emilie","Mila","Scarlett","Evelyn","Abigail","Madison","Lindsay","Jenna","Tatiana","Clarissa","Eugene","Carlos","Russell","Martin","Ernest","Phillip","Todd","Jesse","Craig","Alan","Shawn","Clarence","Sean","Philip","Chris","Johnny","Earl","Jimmy","Antonio","Danny","Bryan","Tony","Luis","Mike","Jeremy","Aaron","Randy","Howard","Eugene","Carlos","Russell","Martin","Ernest","Phillip"];
        
        const lastNames = ["Smith","Johnson","Williams","Brown","Jones","Garcia","Miller","Davis","Rodriguez","Martinez","Hernandez","Lopez","Gonzalez","Wilson","Anderson","Thomas","Taylor","Moore","Jackson","Martin","Lee","Perez","Thompson","White","Harris","Sanchez","Clark","Ramirez","Lewis","Robinson","Walker","Young","Allen","King","Wright","Scott","Torres","Nguyen","Hill","Flores","Green","Adams","Nelson","Baker","Hall","Rivera","Campbell","Mitchell","Carter","Roberts","Gomez","Phillips","Evans","Turner","Diaz","Parker","Cruz","Edwards","Collins","Reyes","Stewart","Morris","Morales","Murphy","Cook","Rogers","Gutierrez","Ortiz","Morgan","Cooper","Peterson","Bailey","Reed","Kelly","Howard","Ramos","Kim","Cox","Ward","Richardson","Watson","Brooks","Chavez","Wood","Bennett","Gray","Mendoza","Ruiz","Hughes","Price","Alvarez","Castillo","Sanders","Patel","Myers","Long","Ross","Foster","Jimenez","Powell","Jenkins","Perry","Russell","Sullivan","Bell","Cole","Berry","Washington","West","Thompson","Richardson","Woods","Cole","Washington","West","Bailey","Reed","Harris","Lewis","Robinson","Walker","Young","Allen","King","Wright","Scott","Torres","Hill","Flores","Green","Adams","Nelson","Baker","Hall","Rivera","Campbell","Mitchell","Carter","Roberts","Gomez","Phillips","Evans","Turner","Diaz","Parker","Cruz","Edwards","Collins","Reyes","Stewart"];

        let generatedUsernames = new Set();
        let currentUsernameList = []; // Menyimpan list username saat ini untuk copy all

        // 1. FUNGSI GANTI TEMA
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        // 2. FUNGSI GENERATE DATA
        function generateData() {
            const amount = parseInt(document.getElementById('amount').value) || 5;
            const grid = document.getElementById('cardGrid');
            const counter = document.getElementById('counterDisplay');
            
            grid.innerHTML = ""; 
            generatedUsernames.clear();
            currentUsernameList = []; // Reset list

            for (let i = 0; i < amount; i++) {
                const first = firstNames[Math.floor(Math.random() * firstNames.length)];
                const last = lastNames[Math.floor(Math.random() * lastNames.length)];
                const fullName = `${first} ${last}`;
                const initials = (first[0] + last[0]).toUpperCase();
                
                // Anti-Duplicate Logic
                let username = "";
                let isUnique = false;
                
                while (!isUnique) {
                    const style = Math.floor(Math.random() * 5); 
                    const randomNum = Math.floor(Math.random() * 99999);

                    switch(style) {
                        // Case 0: Standar + Tambah "2026"
                        case 0: username = (first + last + "2026").toLowerCase(); break;
                        
                        // Case 1-4: Logic Lama (Titik, Angka Random, dll)
                        case 1: username = (first + "." + last + randomNum).toLowerCase(); break;
                        case 2: username = (first + last + randomNum).toLowerCase(); break;
                        case 3: username = (first + "_" + last + randomNum).toLowerCase(); break;
                        case 4: username = (first + randomNum + last).toLowerCase(); break;
                    }

                    if (!generatedUsernames.has(username)) {
                        generatedUsernames.add(username);
                        isUnique = true;
                    }
                }

                const email = `${username}@mail.n2n.io`;

                // Simpan ke array untuk fungsi Copy All
                currentUsernameList.push(`${username}`);

                // Render Card
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="avatar">${initials}</div>
                        <div class="name-group">
                            <div class="name-text">${fullName}</div>
                            <span class="role-badge">Identity</span>
                        </div>
                        <button class="btn-copy-mini" onclick="copyToClipboard('${fullName}')" title="Copy Name">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>

                    <div class="field-row">
                        <div class="field-content">
                            <i class="fa-brands fa-instagram field-icon"></i>
                            <span class="field-value user">@${username}</span>
                        </div>
                        <button class="btn-copy-mini" onclick="copyToClipboard('${username}')" title="Copy Username">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>

                    <div class="field-row">
                        <div class="field-content">
                            <i class="fa-regular fa-envelope field-icon"></i>
                            <span class="field-value email">${email}</span>
                        </div>
                        <button class="btn-copy-mini" onclick="copyToClipboard('${email}')" title="Copy Email">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            }
            counter.innerHTML = `<i class="fa-solid fa-check"></i> Generated: ${amount}`;
        }

        // 3. FUNGSI COPY SATUAN
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const t = document.querySelector('#toast span');
                t.innerText = "Disalin: " + text.substring(0, 20) + (text.length>20?"...":"");
                document.getElementById('toast').classList.add('show');
                setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
            });
        }

        // 4. FUNGSI COPY ALL USERNAME
        function copyAllUsernames() {
            if (currentUsernameList.length === 0) {
                showToast("Tidak ada data untuk disalin!");
                return;
            }
            // Gabungkan semua username dengan baris baru (\n)
            const allText = currentUsernameList.join('\n');
            navigator.clipboard.writeText(allText).then(() => {
                showToast(`${currentUsernameList.length} Usernames Copied!`);
            });
        }

        function showToast(msg) {
            const t = document.querySelector('#toast span');
            t.innerText = msg;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }

        window.onload = generateData;
    </script>
</body>
</html>
